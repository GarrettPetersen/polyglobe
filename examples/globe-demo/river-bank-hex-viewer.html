<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>River bank hex (globe pipeline)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #hud {
        position: fixed;
        left: 14px;
        top: 12px;
        right: 14px;
        color: #c5dce8;
        font-size: 13px;
        text-shadow: 0 1px 3px #000;
        z-index: 1;
        pointer-events: none;
        max-width: 52em;
        line-height: 1.45;
      }
      #hud strong {
        color: #fff;
        display: block;
        margin-bottom: 6px;
      }
      #controls {
        pointer-events: auto;
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
      }
      #controls label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      select {
        background: #1a2530;
        color: #e8f0f8;
        border: 1px solid #3a5a70;
        padding: 4px 8px;
        border-radius: 4px;
      }
      #status {
        position: fixed;
        left: 12px;
        bottom: 10px;
        color: #6a8a9a;
        font-size: 11px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <strong>River bank hex — globe pipeline</strong>
      <p>
        <code>buildRiverBankExtrusionGeometry</code> → same boolean + extrusion as
        <code>createRiverTerrainMeshes</code> on the globe. Teal = banks (lit); magenta wire = top rim of outer
        hex. If teal caps read as solid plates, top faces are oriented correctly.
      </p>
      <div id="controls">
        <label>
          Pattern
          <select id="pattern">
            <option value="0">1 river edge</option>
            <option value="1">2 edges — 60°</option>
            <option value="2">2 edges — 120°</option>
            <option value="3" selected>2 edges — 180° (through)</option>
            <option value="4">3 edges (arc)</option>
            <option value="5">3 edges (alt)</option>
          </select>
        </label>
        <label>
          <input type="checkbox" id="tilted" />
          Tilted plane (globe-like normal)
        </label>
      </div>
    </div>
    <div id="status"></div>
    <script type="module" src="/river-bank-hex-viewer.ts"></script>
  </body>
</html>
