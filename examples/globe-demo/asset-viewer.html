<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asset viewer — Polyglobe Demo</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; background: #0f1216; color: #d8e0e8; }
      #canvas-wrap { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #ui {
        position: fixed; left: 12px; top: 12px; z-index: 10;
        background: rgba(12, 14, 20, 0.92); padding: 14px 16px; border-radius: 10px;
        min-width: 280px; font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
      #ui h2 { margin: 0 0 12px; font-size: 15px; font-weight: 600; }
      #ui .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
      #ui label { color: #909aa8; }
      #ui select {
        flex: 1; min-width: 140px;
        background: #1a1e28; color: #e4eaf0; border: 1px solid #3a4555;
        padding: 6px 10px; border-radius: 6px; font-size: 12px;
      }
      #ui button {
        background: #2a3548; color: #b8c4d4; border: 1px solid #4a5568;
        padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
      }
      #ui button:hover { background: #354055; color: #fff; }
      #ui .nav { display: flex; gap: 6px; }
      #ui .asset-path { margin-top: 8px; font-size: 11px; color: #6a7888; word-break: break-all; }
      #ui .error { color: #e87070; font-size: 12px; margin-top: 8px; }
      #ui .hint { color: #6a7888; font-size: 11px; margin-top: 6px; }
      .viewer-links {
        position: fixed; top: 12px; right: 12px; z-index: 11;
        display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
      }
      .viewer-links a {
        padding: 8px 12px; border-radius: 8px;
        background: rgba(30, 80, 100, 0.85); color: #b8e8f0;
        font-size: 12px; text-decoration: none;
        box-shadow: 0 2px 12px rgba(0,0,0,0.35);
      }
      .viewer-links a:hover { background: rgba(40, 100, 120, 0.95); color: #fff; }
    </style>
  </head>
  <body>
    <div class="viewer-links">
      <a href="/">← Globe</a>
      <a href="/river-hex-viewer.html">River hex</a>
      <a href="/river-bank-hex-viewer.html">River bank 3D</a>
    </div>
    <div id="ui">
      <h2>Asset viewer</h2>
      <div class="row">
        <label for="asset-select">Asset</label>
        <select id="asset-select"></select>
      </div>
      <div class="row nav">
        <button type="button" id="btn-prev">← Prev</button>
        <button type="button" id="btn-next">Next →</button>
      </div>
      <div class="asset-path" id="asset-path"></div>
      <div class="error" id="error"></div>
      <div class="hint" id="hint"></div>
    </div>
    <div id="canvas-wrap"></div>
    <script type="module" src="/asset-viewer.ts"></script>
  </body>
</html>
