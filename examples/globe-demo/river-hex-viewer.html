<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>River hex patterns</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #hud {
        position: fixed;
        left: 14px;
        top: 12px;
        right: 14px;
        color: #c5dce8;
        font-size: 14px;
        text-shadow: 0 1px 3px #000;
        z-index: 1;
        pointer-events: none;
      }
      #hud strong {
        display: block;
        margin-bottom: 6px;
        font-size: 15px;
        color: #fff;
      }
      #hud p {
        margin: 0 0 10px;
        opacity: 0.88;
        font-size: 12px;
        max-width: 42em;
        line-height: 1.45;
      }
      #legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 18px;
        margin-top: 4px;
        pointer-events: none;
      }
      .leg-item {
        display: flex;
        align-items: baseline;
        gap: 6px;
        font-size: 11px;
        color: #9bb8c8;
      }
      .leg-num {
        display: inline-flex;
        width: 1.25rem;
        height: 1.25rem;
        align-items: center;
        justify-content: center;
        background: rgba(40, 90, 110, 0.6);
        border-radius: 4px;
        color: #ffdd44;
        font-weight: 700;
        font-size: 10px;
      }
      .leg-title {
        white-space: nowrap;
      }
      #status {
        position: fixed;
        left: 12px;
        bottom: 10px;
        color: #6a8a9a;
        font-size: 11px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <strong>River hex patterns</strong>
      <p>
        <strong>Teal</strong> is one mesh: outer hex minus (inner ∪ river cutouts) — rivers are real holes, not yellow
        overlays. Good for extruding to 3D. Dark = pit. Drag to orbit.
      </p>
      <div id="legend"></div>
    </div>
    <div id="status"></div>
    <script type="module" src="/river-hex-viewer.ts"></script>
  </body>
</html>
