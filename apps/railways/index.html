<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railways of the Polyglobe</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #0a0a0f; font-family: system-ui, sans-serif; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #panel {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        background: rgba(12, 12, 20, 0.92); color: #e0e4e8;
        padding: 14px 16px; border-radius: 10px; min-width: 260px;
        font-size: 13px; line-height: 1.5;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      }
      #panel h3 { margin-bottom: 10px; font-size: 14px; font-weight: 600; }
      #panel section { margin-bottom: 14px; }
      #panel section:last-child { margin-bottom: 0; }
      #panel label { display: block; margin-bottom: 2px; color: #a0a8b0; }
      #panel input[type="range"] { width: 100%; margin: 2px 0 6px; accent-color: #6b9b5c; }
      #panel input[type="checkbox"] { margin-right: 8px; vertical-align: middle; accent-color: #6b9b5c; }
      #panel .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
      #panel button { font: inherit; padding: 4px 10px; border-radius: 6px; border: 1px solid #4a5568; background: #2a3140; color: #e0e4e8; cursor: pointer; }
      #panel button:hover { background: #3a4252; }
      #panel select { font: inherit; padding: 3px 6px; border-radius: 4px; max-width: 100%; }
      #panel .procedural { margin-left: 0; padding-left: 0; border-left: none; }
      #panel .value { float: right; color: #8090a0; font-variant-numeric: tabular-nums; }
      #panel .loading { margin-top: 10px; padding: 6px 10px; background: rgba(100,120,140,0.3); border-radius: 6px; font-size: 12px; color: #a0b0c0; display: none; }
      #panel .loading.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="panel"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
